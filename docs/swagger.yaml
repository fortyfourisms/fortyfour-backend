host: localhost:8080
info:
  contact: {}
  description: API documentation for Fortyfour Backend - main auth and management
    service.
  title: Fortyfour Backend API
  version: "1.0"
paths:
  /api/casbin/permissions:
    get:
      description: Mengambil permissions untuk role tertentu
      parameters:
      - description: Role name
        in: query
        name: role
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get role permissions
      tags:
      - Casbin
  /api/casbin/policies:
    get:
      description: Mengambil semua permission policies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get all Casbin policies
      tags:
      - Casbin
  /api/casbin/policies/add:
    post:
      consumes:
      - application/json
      description: Menambahkan satu permission policy (admin only)
      parameters:
      - description: Policy data
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/fortyfour-backend_internal_dto.AddPolicyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add Casbin policy
      tags:
      - Casbin
  /api/casbin/policies/bulk:
    post:
      consumes:
      - application/json
      description: Menambahkan banyak permission policies sekaligus (admin only)
      parameters:
      - description: Bulk policy data
        in: body
        name: policies
        required: true
        schema:
          $ref: '#/definitions/fortyfour-backend_internal_dto.BulkAddPolicyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Bulk add Casbin policies
      tags:
      - Casbin
  /api/casbin/policies/remove:
    delete:
      consumes:
      - application/json
      description: Menghapus satu permission policy (admin only)
      parameters:
      - description: Policy to remove
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/fortyfour-backend_internal_dto.RemovePolicyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove Casbin policy
      tags:
      - Casbin
  /api/chat:
    post:
      consumes:
      - application/json
      description: Mengirim pesan ke AI dan menerima respons secara streaming via
        Server-Sent Events
      parameters:
      - description: Chat request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/fortyfour-backend_internal_dto.ChatRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Chat dengan AI (SSE streaming)
      tags:
      - Chat
  /api/chat/delete-session:
    delete:
      consumes:
      - application/json
      description: Menghapus riwayat percakapan berdasarkan session ID
      parameters:
      - description: Session ID
        in: body
        name: request
        required: true
        schema:
          properties:
            session_id:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Hapus chat session
      tags:
      - Chat
  /api/csirt:
    post:
      consumes:
      - multipart/form-data
      description: Membuat record CSIRT baru dengan file upload
      parameters:
      - description: ID Perusahaan
        in: formData
        name: id_perusahaan
        required: true
        type: string
      - description: Nama CSIRT
        in: formData
        name: nama_csirt
        required: true
        type: string
      - description: Website CSIRT
        in: formData
        name: web_csirt
        type: string
      - description: Telepon CSIRT
        in: formData
        name: telepon_csirt
        type: string
      - description: Photo CSIRT
        in: formData
        name: photo_csirt
        type: file
      - description: File RFC2350
        in: formData
        name: file_rfc2350
        type: file
      - description: File Public Key PGP
        in: formData
        name: file_public_key_pgp
        type: file
      - description: File STR CSIRT (nullable)
        in: formData
        name: file_str
        type: file
      - description: Tanggal Registrasi (YYYY-MM-DD)
        in: formData
        name: tanggal_registrasi
        type: string
      - description: Tanggal Kadaluarsa (YYYY-MM-DD)
        in: formData
        name: tanggal_kadaluarsa
        type: string
      - description: Tanggal Registrasi Ulang (YYYY-MM-DD)
        in: formData
        name: tanggal_registrasi_ulang
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.CsirtResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Tambah CSIRT baru
      tags:
      - CSIRT
  /api/csirt/{id}:
    delete:
      description: Menghapus data CSIRT berdasarkan ID
      parameters:
      - description: CSIRT ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Hapus CSIRT
      tags:
      - CSIRT
    get:
      description: Mengambil satu data CSIRT
      parameters:
      - description: CSIRT ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.CsirtResponse'
        "404":
          description: Not Found
