info:
  contact: {}
paths:
  /api/casbin/permissions:
    get:
      description: Mengambil permissions untuk role tertentu
      parameters:
      - description: Role name
        in: query
        name: role
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get role permissions
      tags:
      - Casbin
  /api/casbin/policies:
    get:
      description: Mengambil semua permission policies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get all Casbin policies
      tags:
      - Casbin
  /api/casbin/policies/add:
    post:
      consumes:
      - application/json
      description: Menambahkan satu permission policy (admin only)
      parameters:
      - description: Policy data
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/fortyfour-backend_internal_dto.AddPolicyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add Casbin policy
      tags:
      - Casbin
  /api/casbin/policies/bulk:
    post:
      consumes:
      - application/json
      description: Menambahkan banyak permission policies sekaligus (admin only)
      parameters:
      - description: Bulk policy data
        in: body
        name: policies
        required: true
        schema:
          $ref: '#/definitions/fortyfour-backend_internal_dto.BulkAddPolicyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/fortyfour-backend_internal_dto.ErrorResponse'
