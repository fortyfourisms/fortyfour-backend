name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag to rollback to'
        required: true
        type: string

jobs:
  rollback:
    name: Rollback to Previous Version
    runs-on: ubuntu-latest

    steps:
      - name: Rollback on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/myapp
            
            # Login to registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            # Pull specified version
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}:${{ inputs.tag }}
            
            # Tag as latest
            docker tag ${{ env.REGISTRY }}/${{ github.repository }}:${{ inputs.tag }} myapp:latest
            
            # Restart containers
            docker-compose down
            docker-compose up -d
            
            # Verify health
            sleep 10
            curl -f http://localhost:8080/api/health || exit 1
            
            echo "✅ Rollback to ${{ inputs.tag }} successful!"