name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  # pull_request:
  #   types: [closed]
  #   branches:
  #     - main

env:
  GO_VERSION: '1.26.1'
  DOCKER_IMAGE: fourtyfour
  REGISTRY: ghcr.io

jobs:
  # ============================================================
  # Job 1: Code Quality & Security Checks
  # ============================================================
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Please run 'go fmt ./...'"
            gofmt -s -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Install gosec (security scanner)
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec security scanner
        run: gosec -fmt=json -out=gosec-report.json ./...
        continue-on-error: true

      - name: Upload gosec report
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec-report.json

      - name: Check for vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ============================================================
  # Job 2: Run Tests
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: code-quality

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html

      - name: Check test coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Test coverage: $coverage%"
          if (( $(echo "$coverage < 20" | bc -l) )); then
            echo "Coverage is below 20%"
            exit 1
          fi

  # ============================================================
  # Job 3: Build and Scan Docker Image
  # ============================================================
  build:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-sha: ${{ steps.sha.outputs.sha_tag }}
      ikas-sha: ${{ steps.sha.outputs.ikas_sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.G_TOKEN }}

      # Generate proper metadata with lowercase
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract SHA tag
        id: sha
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_TAG="${{ env.REGISTRY }}/${REPO_LOWER}:${SHA_SHORT}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "SHA tag: ${SHA_TAG}"
          # IKAS image tag (different repo name)
          IKAS_REPO=$(echo "${{ github.repository_owner }}/fortyfour-ikas" | tr '[:upper:]' '[:lower:]')
          IKAS_SHA_TAG="${{ env.REGISTRY }}/${IKAS_REPO}:${SHA_SHORT}"
          echo "ikas_sha_tag=${IKAS_SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "IKAS SHA tag: ${IKAS_SHA_TAG}"

      # Generate IKAS metadata
      - name: Extract IKAS metadata
        id: ikas-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fortyfour-ikas
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Build image locally first for scanning
      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true  # Load into Docker daemon for Trivy scan
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Debug: Show what was built
      - name: Verify built image
        run: |
          echo "=== Built Images ==="
          docker images
          echo ""
          echo "=== Image to scan ==="
          echo "${{ fromJSON(steps.meta.outputs.json).tags[0] }}"

      # Scan the LOCAL image (not from registry)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln'
          timeout: '10m'
          exit-code: '0'
        continue-on-error: true

      # Generate SARIF only for public repos or if Advanced Security enabled
      - name: Run Trivy for SARIF (if supported)
        uses: aquasecurity/trivy-action@0.31.0
        if: github.event.repository.private == false || github.event.repository.visibility == 'public'
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln'
        continue-on-error: true

      # Also generate JSON report as backup
      - name: Run Trivy for JSON report
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: 'json'
          output: 'trivy-results.json'
          scanners: 'vuln'
        continue-on-error: true

      # Upload JSON report as artifact (always works)
      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-json-report
          path: trivy-results.json

      # Also generate HTML report for artifacts
      - name: Run Trivy for HTML report
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: 'json'
          output: 'trivy-report.json'
          scanners: 'vuln'
        continue-on-error: true

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json

      # Upload SARIF to GitHub Security (only for public repos or with Advanced Security)
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: |
          always() && 
          github.event_name != 'pull_request' &&
          (github.event.repository.private == false || github.event.repository.visibility == 'public')
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container-scan'
        continue-on-error: true  # Don't fail if Security tab unavailable

      # NOW push the main image after successful scan
      - name: Push Docker image to registry
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      # Build and push IKAS image
      - name: Build and push IKAS Docker image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ikas/Dockerfile
          push: true
          tags: ${{ steps.ikas-meta.outputs.tags }}
          labels: ${{ steps.ikas-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 4: Deploy to VPS
  # ============================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Wait for image to propagate in registry
      - name: Wait for image propagation
        run: |
          echo "Waiting 20 seconds for image to be fully available in registry..."
          echo "This ensures the image is ready for VPS to pull"
          sleep 20
          echo "✅ Ready to deploy"

      - name: Create deployment directory structure
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p ~/fortyfour-backend
            mkdir -p ~/fortyfour-backend/migrations
            mkdir -p ~/fortyfour-backend/uploads
            chmod 755 ~/fortyfour-backend/uploads

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.yml,migrations/*,nginx/conf.d/app.conf"
          target: ~/fortyfour-backend

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-sha }}
          IKAS_TAG: ${{ needs.build.outputs.ikas-sha }}
          G_TOKEN: ${{ secrets.G_TOKEN }}
          ACTOR: ${{ github.actor }}
          REGISTRY: ${{ env.REGISTRY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: IMAGE_TAG,IKAS_TAG,G_TOKEN,ACTOR,REGISTRY
          script: |
            cd ~/fortyfour-backend
            
            echo "=== Deployment Info ==="
            echo "Main image: ${IMAGE_TAG}"
            echo "IKAS image: ${IKAS_TAG}"
            echo "Registry: ${REGISTRY}"
            echo "Actor: ${ACTOR}"
            
            # Load environment variables from system config
            if [ -f /etc/fortyfour-backend/environment ]; then
              export $(cat /etc/fortyfour-backend/environment | xargs)
              echo "✅ Environment variables loaded"
            else
              echo "⚠️  Warning: Environment file not found, using defaults"
            fi
            
            # Logout first to clear any cached credentials
            docker logout ${REGISTRY} 2>/dev/null || true
            
            # Login to GitHub Container Registry
            echo "Logging in to ${REGISTRY}..."
            echo "${G_TOKEN}" | docker login ${REGISTRY} -u ${ACTOR} --password-stdin
            
            if [ $? -ne 0 ]; then
              echo "❌ Failed to login to registry!"
              echo "Please check:"
              echo "1. G_TOKEN has 'read:packages' permission"
              echo "2. Token is valid and not expired"
              echo "3. Actor (${ACTOR}) has access to the package"
              exit 1
            fi
            
            echo "✅ Login successful"
            
            if [ -z "${IMAGE_TAG}" ]; then
              echo "❌ IMAGE_TAG is empty or invalid!"
              exit 1
            fi
            
            echo "Pulling image: ${IMAGE_TAG}"
            RETRIES=5
            RETRY_DELAY=10
            
            for i in $(seq 1 $RETRIES); do
              echo "Pull attempt $i/$RETRIES..."
              
              if docker pull "${IMAGE_TAG}"; then
                echo "✅ Successfully pulled: ${IMAGE_TAG}"
                PULL_SUCCESS=true
                break
              else
                echo "❌ Pull attempt $i failed"
                
                if [ $i -lt $RETRIES ]; then
                  echo "Waiting ${RETRY_DELAY} seconds before retry..."
                  sleep $RETRY_DELAY
                else
                  echo ""
                  echo "=== Pull Failed After $RETRIES Attempts ==="
                  echo "Image: ${IMAGE_TAG}"
                  echo ""
                  echo "Possible causes:"
                  echo "1. Image not yet available in registry (propagation delay)"
                  echo "2. Network connectivity issues"
                  echo "3. Authentication problems"
                  echo ""
                  echo "Debug info:"
                  echo "Registry: ${REGISTRY}"
                  echo "Repository: $(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')"
                  echo ""
                  echo "Checking local images:"
                  docker images | head -20
                  exit 1
                fi
              fi
            done
            
            if [ -z "$PULL_SUCCESS" ]; then
              echo "❌ Failed to pull image after all retries"
              exit 1
            fi
            # Pull IKAS image
            echo "Pulling IKAS image: ${IKAS_TAG}"
            for i in $(seq 1 3); do
              if docker pull "${IKAS_TAG}"; then
                echo "✅ Successfully pulled IKAS: ${IKAS_TAG}"
                break
              fi
              echo "Retry $i/3 for IKAS image..."
              sleep 10
              if [ $i -eq 3 ]; then
                echo "❌ Failed to pull IKAS image"
                exit 1
              fi
            done

            # Update docker-compose.yml to use the specific image tags
            echo "Updating docker-compose.yml with images"
            sed -i "s|image:.*ghcr.io.*/fortyfour-backend.*|image: ${IMAGE_TAG}|g" docker-compose.yml
            sed -i "s|image:.*ghcr.io.*/fortyfour-ikas.*|image: ${IKAS_TAG}|g" docker-compose.yml
            
            # Stop and remove old containers
            echo "Stopping old containers..."
            docker compose down || true
            
            # Ensure uploads directory exists with correct permissions
            mkdir -p ~/fortyfour-backend/uploads
            chmod 755 ~/fortyfour-backend/uploads
            # Ensure nginx can traverse to the uploads directory
            chmod o+x $HOME
            chmod o+x $HOME/fortyfour-backend
            echo "✅ Uploads directory ready"
            
            # Deploy Nginx config with correct uploads path
            UPLOADS_PATH="usr/share/nginx/html/uploads"
            sed "s|alias /app/uploads/;|alias ${UPLOADS_PATH}/;|g" \
            # ~/fortyfour-backend/nginx/conf.d/app.conf > /tmp/app.conf
            # sudo cp /tmp/app.conf /etc/nginx/conf.d/app.conf
            # sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Nginx config updated and reloaded"
            
            # Start new containers
            echo "Starting new containers..."
            docker compose up -d
            
            # Clean up old images (keep last 3)
            echo "Cleaning up old images..."
            docker images --format "{{.Repository}}:{{.Tag}} {{.ID}}" | \
              grep "$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" | \
              tail -n +4 | \
              awk '{print $2}' | \
              xargs -r docker rmi -f || true
            
            # Wait for health check - Main app
            echo "Waiting for main service to start..."
            for i in {1..30}; do
              sleep 2
              if curl -f http://localhost:8080/api/health 2>/dev/null; then
                echo "✅ Main app health check passed!"
                break
              fi
              echo "Attempt $i/30: Main app not ready yet..."
              if [ $i -eq 30 ]; then
                echo "❌ Main app health check failed!"
                docker compose logs app --tail=50
                exit 1
              fi
            done
            
            # Wait for health check - IKAS
            echo "Waiting for IKAS service to start..."
            for i in {1..30}; do
              sleep 2
              if curl -f http://localhost:8081/api/maturity/health 2>/dev/null; then
                echo "✅ IKAS health check passed!"
                break
              fi
              echo "Attempt $i/30: IKAS not ready yet..."
              if [ $i -eq 30 ]; then
                echo "❌ IKAS health check failed!"
                docker compose logs ikas --tail=50
                exit 1
              fi
            done
            
            echo ""
            echo "✅ Deployment successful!"
            echo "Main app: ${IMAGE_TAG}"
            echo "IKAS:     ${IKAS_TAG}"

      - name: Notify deployment success
        if: success()
        run: |
          echo "================================================"
          echo "✅ DEPLOYMENT SUCCESSFUL!"
          echo "================================================"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "Deployed to: ${{ secrets.VPS_HOST }}"
          echo "Time: $(date)"
          echo "================================================"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment to VPS failed!"
          exit 1

  # ============================================================
  # Job 5: Smoke Tests (Post-Deployment)
  # ============================================================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Wait for service to be ready
        run: sleep 30

      - name: Test health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.SITE_URL }}/api/health)
          if [ $response -ne 200 ]; then
            echo "❌ Health check failed with status: $response"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: Test API endpoints
        run: |
          # Test posts endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.SITE_URL }}/api/jabatan)
          if [ $response -ne 200 ] && [ $response -ne 401 ]; then
            echo "❌ Posts endpoint failed with status: $response"
            exit 1
          fi
          echo "✅ API endpoints working"

      - name: Final summary
        if: success()
        run: |
          echo "================================================"
          echo "✅ CI/CD Pipeline Completed Successfully!"
          echo "================================================"
          echo "Build: ✅"
          echo "Security Scan: ✅"
          echo "Deploy: ✅"
          echo "Smoke Tests: ✅"
          echo "================================================"