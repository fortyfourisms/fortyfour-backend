name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main

env:
  GO_VERSION: '1.25'
  DOCKER_IMAGE: fourtyfour
  REGISTRY: ghcr.io

jobs:
  # ============================================================
  # Job 1: Code Quality & Security Checks
  # ============================================================
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Please run 'go fmt ./...'"
            gofmt -s -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Install gosec (security scanner)
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec security scanner
        run: gosec -fmt=json -out=gosec-report.json ./...
        continue-on-error: true

      - name: Upload gosec report
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec-report.json

      - name: Check for vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ============================================================
  # Job 2: Run Tests
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: code-quality

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html

      - name: Check test coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Test coverage: $coverage%"
          if (( $(echo "$coverage < 20" | bc -l) )); then
            echo "Coverage is below 20%"
            exit 1
          fi

  # ============================================================
  # Job 3: Build and Scan Docker Image
  # ============================================================
  build:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.G_TOKEN }}

      # Generate proper metadata with lowercase
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      # Build image locally first for scanning
      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true  # Load into Docker daemon for Trivy scan
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Debug: Show what was built
      - name: Verify built image
        run: |
          echo "=== Built Images ==="
          docker images
          echo ""
          echo "=== Image to scan ==="
          echo "${{ fromJSON(steps.meta.outputs.json).tags[0] }}"

      # Scan the LOCAL image (not from registry)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail build on vulnerabilities
        continue-on-error: true

      # Also generate HTML report for artifacts
      - name: Run Trivy for HTML report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: 'template'
          template: '@/contrib/html.tpl'
          output: 'trivy-report.html'
        continue-on-error: true

      - name: Upload Trivy HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.html

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # NOW push the image after successful scan
      - name: Push Docker image to registry
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  # ============================================================
  # Job 4: Deploy to VPS
  # ============================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment directory structure
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p ~/fourtyfour
            mkdir -p ~/fourtyfour/migrations

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.yml,migrations/*"
          target: ~/fourtyfour

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/fourtyfour
            
            # Login to GitHub Container Registry
            echo "${{ secrets.G_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            # Get lowercase repository name
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_REF="${{ env.REGISTRY }}/${REPO_LOWER}:sha-${{ github.sha }}"
            
            echo "Pulling image: ${IMAGE_REF}"
            
            # Pull latest image
            docker pull "${IMAGE_REF}"
            
            # Tag as latest
            docker tag "${IMAGE_REF}" fourtyfour:latest
            
            # Stop and remove old containers
            docker-compose down || true
            
            # Start new containers
            docker-compose up -d
            
            # Clean up old images (keep last 3)
            docker images | grep "${{ env.REGISTRY }}/${{ github.repository }}" | tail -n +4 | awk '{print $3}' | xargs -r docker rmi || true
            
            # Wait for health check
            echo "Waiting for service to start..."
            sleep 15
            
            # Verify deployment
            if ! curl -f http://localhost:8080/api/health; then
              echo "Health check failed!"
              docker-compose logs --tail=50
              exit 1
            fi
            
            echo "✅ Deployment successful!"

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment to VPS successful!"
          echo "Image: ${{ env.REGISTRY }}/${{ github.repository }}:sha-${{ github.sha }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment to VPS failed!"
          exit 1

  # ============================================================
  # Job 5: Smoke Tests (Post-Deployment)
  # ============================================================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Wait for service to be ready
        run: sleep 30

      - name: Test health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VPS_HOST }}:8080/api/health)
          if [ $response -ne 200 ]; then
            echo "❌ Health check failed with status: $response"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: Test API endpoints
        run: |
          # Test posts endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VPS_HOST }}:8080/api/posts)
          if [ $response -ne 200 ] && [ $response -ne 401 ]; then
            echo "❌ Posts endpoint failed with status: $response"
            exit 1
          fi
          echo "✅ API endpoints working"

      - name: Final summary
        if: success()
        run: |
          echo "================================================"
          echo "✅ CI/CD Pipeline Completed Successfully!"
          echo "================================================"
          echo "Build: ✅"
          echo "Security Scan: ✅"
          echo "Deploy: ✅"
          echo "Smoke Tests: ✅"
          echo "================================================"