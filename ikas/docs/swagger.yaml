host: localhost:8081
info:
  contact: {}
  description: API documentation for IKAS (Indeks Kematangan Keamanan Siber) service.
  title: IKAS API
  version: "1.0"
paths:
  /api/deteksi:
    get:
      description: Mengambil seluruh data deteksi
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.DeteksiResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List semua deteksi
      tags:
      - Deteksi
  /api/deteksi/{id}:
    get:
      parameters:
      - description: Deteksi ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DeteksiResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Ambil deteksi berdasarkan ID
      tags:
      - Deteksi
  /api/gulih:
    get:
      description: Mengambil seluruh data gulih
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.GulihResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List semua gulih
      tags:
      - Gulih
  /api/gulih/{id}:
    get:
      parameters:
      - description: Gulih ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GulihResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Ambil gulih berdasarkan ID
      tags:
      - Gulih
  /api/health:
    get:
      description: Check if the API is running and healthy
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
  /api/identifikasi:
    get:
      description: Mengambil seluruh data identifikasi
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.IdentifikasiResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List semua identifikasi
      tags:
      - Identifikasi
  /api/identifikasi/{id}:
    get:
      description: Mengambil satu data identifikasi
      parameters:
      - description: Identifikasi ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.IdentifikasiResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Ambil identifikasi berdasarkan ID
      tags:
      - Identifikasi
  /api/maturity/domain:
    get:
      description: Mengambil seluruh data domain
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.DomainResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List semua domain
      tags:
      - Domain
    post:
      consumes:
      - application/json
      description: Membuat record domain baru
      parameters:
      - description: Data domain
        in: body
        name: domain
        required: true
        schema:
          $ref: '#/definitions/dto.CreateDomainRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.DomainResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Tambah domain baru
