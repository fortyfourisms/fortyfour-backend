        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ikas_internal_dto.ErrorResponse'
      summary: Hapus domain
      tags:
      - Domain
    get:
      description: Mengambil satu data domain
      parameters:
      - description: Domain ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ikas_internal_dto.DomainResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ikas_internal_dto.ErrorResponse'
      summary: Ambil domain berdasarkan ID
      tags:
      - Domain
    put:
      consumes:
      - application/json
      description: Mengubah data domain berdasarkan ID
      parameters:
      - description: Domain ID
        in: path
        name: id
        required: true
        type: string
      - description: Data update
        in: body
        name: domain
        required: true
        schema:
          $ref: '#/definitions/ikas_internal_dto.UpdateDomainRequest'
      produces:
