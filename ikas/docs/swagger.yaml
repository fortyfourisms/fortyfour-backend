host: localhost:8081
info:
  contact: {}
  description: API documentation for IKAS (Indeks Kematangan Keamanan Siber) service.
  title: IKAS API
  version: "1.0"
paths:
  /api/health:
    get:
      description: Check if the API is running and healthy
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
  /api/maturity/domain:
    get:
      description: Mengambil seluruh data domain
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/ikas_internal_dto.DomainResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ikas_internal_dto.ErrorResponse'
      summary: List semua domain
      tags:
      - Domain
    post:
      consumes:
      - application/json
      description: Membuat record domain baru
      parameters:
      - description: Data domain
        in: body
        name: domain
        required: true
        schema:
          $ref: '#/definitions/ikas_internal_dto.CreateDomainRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/ikas_internal_dto.DomainResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ikas_internal_dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ikas_internal_dto.ErrorResponse'
      summary: Tambah domain baru
      tags:
      - Domain
  /api/maturity/domain/{id}:
    delete:
      description: Menghapus data domain berdasarkan ID
      parameters:
      - description: Domain ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
