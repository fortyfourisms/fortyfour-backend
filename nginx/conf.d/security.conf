# Block bad bots
map $http_user_agent $bad_bot {
    default 0;
    ~*^$ 1;
    ~*bot 1;
    ~*scanner 1;
    ~*crawler 1;
    ~*spider 1;
    ~*wget 1;
    ~*curl 1;
}

# Block bad referers
map $http_referer $bad_referer {
    default 0;
    ~*spam 1;
    ~*porn 1;
    ~*xxx 1;
}

