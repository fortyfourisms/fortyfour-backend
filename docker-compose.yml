services:
  # Main Auth Service (root)
  app:
    image: ghcr.io/fortyfourisms/fortyfour-backend:latest
    container_name: fortyfour-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PORT: ":8080"
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      
      # Host MySQL connection
      DB_HOST: 154.26.136.33
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      
      # Redis container
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Gemini AI
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: /

      ENVIRONMENT: ${ENVIRONMENT:-production}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    volumes:
      - uploads:/app/uploads
    ports:
      - 8080:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # IKAS Service (ikas/)
  ikas:
    image: ghcr.io/fortyfourisms/fortyfour-ikas:latest
    container_name: fortyfour-ikas
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PORT: ":8081"
      JWT_SECRET: ${JWT_SECRET}

      # Same database
      DB_HOST: 154.26.136.33
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

      # Redis container
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      LOG_LEVEL: ${LOG_LEVEL:-info}

      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: /

      ENVIRONMENT: ${ENVIRONMENT:-production}
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    ports:
      - 8081:8081
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Redis Cache (shared between both services)
  redis:
    image: redis:8.4-alpine
    container_name: fortyfour-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - redis_data:/data
    networks:
      - app-network
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: sh -c "redis-server --requirepass $${REDIS_PASSWORD:-redispass} --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1 --loglevel warning"
    expose:
      - "6379"

  # RabbitMQ Message Broker (shared between both services)
  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: fortyfour-rabbitmq
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    expose:
      - "5672"
    ports:
      - "15672:15672"  # Management UI

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /usr/share/nginx/html/uploads