services:
  # Go Application
  app:
    image: ghcr.io/fortyfourisms/fortyfour-backend:latest
    container_name: fortyfour-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PORT: ":8080"
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      
      # Host MySQL connection (use host.docker.internal or host IP)
      # DB_HOST: host.docker.internal  # For Docker Desktop
      # DB_HOST: 172.17.0.1          # For Linux Docker (bridge network gateway)
      DB_HOST: 154.26.136.33      # Or use actual host IP
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      
      # Redis container
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      ROLLBAR_TOKEN: ${ROLLBAR_TOKEN}
      ROLLBAR_STATUS: ${ROLLBAR_STATUS}
      
      ENVIRONMENT: ${ENVIRONMENT:-production}
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    # Only expose to internal network (Nginx will handle external traffic)
    ports:
      - 8080:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Redis Cache
  redis:
    image: redis:8.4-alpine
    container_name: fortyfour-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - redis_data:/data
    networks:
      - app-network
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: sh -c "redis-server --requirepass $${REDIS_PASSWORD:-redispass} --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1 --loglevel warning"
    expose:
      - "6379"

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
    driver: local